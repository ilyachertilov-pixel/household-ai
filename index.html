<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🏠 Умная семья</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#0a0a18;
  font-family:'Courier New',monospace;
  user-select:none;
  touch-action:none;
}
body {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
}
h1 {
  color:#ffd700;
  font-size:11px;
  letter-spacing:4px;
  padding:6px 0 4px;
  text-shadow:0 0 20px #ffd70055;
  flex-shrink:0;
}
canvas {
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  cursor:pointer;
  display:block;
  width:100vw;
  height:auto;
  max-width:480px;
  touch-action:manipulation;
}
.hint { color:#2a2a4a; font-size:9px; letter-spacing:2px; padding:4px 0; flex-shrink:0; }

#overlay { display:none; position:fixed; inset:0; background:#00000077; z-index:10; }
#panel {
  display:none; position:fixed; z-index:20;
  top:50%; left:50%; transform:translate(-50%,-50%);
  background:#0d0d24; border:2px solid #ffd700;
  width:min(300px, 88vw);
  padding:16px 18px; color:#ccc;
  font-size:13px; line-height:1.7;
  max-height:75vh; overflow-y:auto;
}
#panel h2 { color:#ffd700; font-size:14px; margin-bottom:8px; padding-right:24px; }
.close { position:absolute; top:8px; right:12px; cursor:pointer; color:#555; font-size:24px; padding:4px 8px; }
.close:active { color:#ffd700; }
.badge { display:inline-block; font-size:10px; padding:3px 10px; margin-bottom:10px; }
.ok   { background:#1a4a20; color:#44ff88; }
.warn { background:#4a2800; color:#ff9944; }
ul { padding-left:18px; }
li { margin:3px 0; color:#aaa; }
.note { margin-top:10px; font-size:11px; color:#555; border-top:1px solid #1a1a3a; padding-top:8px; }
.section-label { color:#ffd700; font-size:9px; letter-spacing:2px; margin:10px 0 4px; }
</style>
</head>
<body>
<h1>★ УМНАЯ СЕМЬЯ ★</h1>
<canvas id="c" width="480" height="800"></canvas>
<p class="hint">НАЖМИТЕ НА ПЕРСОНАЖА</p>
<div id="overlay" onclick="closePanel()"></div>
<div id="panel">
  <span class="close" onclick="closePanel()">✕</span>
  <h2 id="pt"></h2><div id="pc"></div>
</div>
<script>
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W=480, H=800;

// ── PORTRAIT ROOM LAYOUT ──
// Top row:   Кухня (left) + Гостиная (right)   y=10..318
// Middle:    Спальня (full width)               y=328..558
// Bottom row: Санузел (left) + Гардеробная (right) y=568..790
const RM = {
  kt: { x:10,  y:10,  w:228, h:308 }, // кухня
  lv: { x:248, y:10,  w:222, h:308 }, // гостиная
  bd: { x:10,  y:328, w:460, h:230 }, // спальня
  bt: { x:10,  y:568, w:228, h:222 }, // санузел
  wd: { x:248, y:568, w:222, h:222 }, // гардеробная
};
const WCLR = '#2a1e14';

// ── FLOOR TEXTURES ──
function drawFloor(x,y,w,h,base,type){
  ctx.fillStyle=base; ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(0,0,0,0.07)'; ctx.lineWidth=1;
  if(type==='tile'){
    const T=20;
    for(let tx=x;tx<x+w;tx+=T){ctx.beginPath();ctx.moveTo(tx,y);ctx.lineTo(tx,y+h);ctx.stroke();}
    for(let ty=y;ty<y+h;ty+=T){ctx.beginPath();ctx.moveTo(x,ty);ctx.lineTo(x+w,ty);ctx.stroke();}
  } else if(type==='plank'){
    const T=14;
    for(let ty=y;ty<y+h;ty+=T){ctx.beginPath();ctx.moveTo(x,ty);ctx.lineTo(x+w,ty);ctx.stroke();}
    ctx.strokeStyle='rgba(0,0,0,0.03)';
    for(let tx=x+35;tx<x+w;tx+=70){ctx.beginPath();ctx.moveTo(tx,y);ctx.lineTo(tx,y+h);ctx.stroke();}
  } else if(type==='carpet'){
    ctx.strokeStyle='rgba(255,255,255,0.04)'; const T=7;
    for(let tx=x;tx<x+w;tx+=T){ctx.beginPath();ctx.moveTo(tx,y);ctx.lineTo(tx,y+h);ctx.stroke();}
    for(let ty=y;ty<y+h;ty+=T){ctx.beginPath();ctx.moveTo(x,ty);ctx.lineTo(x+w,ty);ctx.stroke();}
  }
}

// ── FURNITURE ──
function drawFurniture(){
  const r=RM;

  // ── КУХНЯ ──
  // Counter L: top wall + left wall
  ctx.fillStyle='#7a5a38';
  ctx.fillRect(r.kt.x+8, r.kt.y+8, r.kt.w-16, 38); // top counter
  ctx.fillRect(r.kt.x+8, r.kt.y+8, 38, 140);         // left counter
  ctx.fillStyle='#9a8060';
  ctx.fillRect(r.kt.x+8, r.kt.y+8, r.kt.w-16, 7);   // edge top
  ctx.fillRect(r.kt.x+8, r.kt.y+8, 7, 140);           // edge left
  // Stove
  ctx.fillStyle='#444'; ctx.fillRect(r.kt.x+50, r.kt.y+11, 48, 28);
  ctx.fillStyle='#cc3300';
  ctx.beginPath(); ctx.arc(r.kt.x+62, r.kt.y+19, 6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r.kt.x+84, r.kt.y+19, 6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r.kt.x+62, r.kt.y+32, 6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r.kt.x+84, r.kt.y+32, 6,0,Math.PI*2); ctx.fill();
  // Sink
  ctx.fillStyle='#88aab0'; ctx.fillRect(r.kt.x+11, r.kt.y+58, 24, 18);
  ctx.fillStyle='#6a8a90'; ctx.fillRect(r.kt.x+13, r.kt.y+60, 20, 14);
  // Fridge
  ctx.fillStyle='#c0c0c0'; ctx.fillRect(r.kt.x+11, r.kt.y+88, 32, 44);
  ctx.fillStyle='#aaa'; ctx.fillRect(r.kt.x+13, r.kt.y+90, 28, 18); ctx.fillRect(r.kt.x+13, r.kt.y+110, 28, 18);
  ctx.fillStyle='#888'; ctx.fillRect(r.kt.x+37, r.kt.y+97, 4, 8); ctx.fillRect(r.kt.x+37, r.kt.y+116, 4, 8);
  // Kitchen table
  ctx.fillStyle='#9a7040'; ctx.fillRect(r.kt.x+60, r.kt.y+160, 120, 70);
  ctx.fillStyle='#7a5020';
  ctx.fillRect(r.kt.x+62,r.kt.y+162,7,7); ctx.fillRect(r.kt.x+171,r.kt.y+162,7,7);
  ctx.fillRect(r.kt.x+62,r.kt.y+221,7,7); ctx.fillRect(r.kt.x+171,r.kt.y+221,7,7);
  // Chairs
  ctx.fillStyle='#8a6030';
  ctx.fillRect(r.kt.x+76, r.kt.y+146, 26,12);
  ctx.fillRect(r.kt.x+140,r.kt.y+146, 26,12);
  ctx.fillRect(r.kt.x+76, r.kt.y+232, 26,12);
  ctx.fillRect(r.kt.x+140,r.kt.y+232, 26,12);
  ctx.fillRect(r.kt.x+46, r.kt.y+178, 12,26);
  ctx.fillRect(r.kt.x+184,r.kt.y+178, 12,26);

  // ── ГОСТИНАЯ ──
  // TV against top wall
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(r.lv.x+16, r.lv.y+8, 80, 50);
  ctx.fillStyle='#334455'; ctx.fillRect(r.lv.x+18, r.lv.y+10, 76, 46);
  ctx.fillStyle='#111'; ctx.fillRect(r.lv.x+46, r.lv.y+58, 24, 8);
  // Sofa (against right wall)
  ctx.fillStyle='#5a3a8a'; ctx.fillRect(r.lv.x+10, r.lv.y+80, 198, 66);
  ctx.fillStyle='#6a4a9a';
  ctx.fillRect(r.lv.x+10, r.lv.y+80, 198, 10);  // back
  ctx.fillRect(r.lv.x+188,r.lv.y+80, 10, 66);   // arm right
  ctx.fillRect(r.lv.x+10, r.lv.y+80, 10, 66);   // arm left
  ctx.fillStyle='#7a5aaa';
  ctx.fillRect(r.lv.x+22, r.lv.y+90, 52, 44);
  ctx.fillRect(r.lv.x+82, r.lv.y+90, 52, 44);
  ctx.fillRect(r.lv.x+142,r.lv.y+90, 40, 44);
  // Rug
  ctx.fillStyle='rgba(100,60,140,0.3)'; ctx.fillRect(r.lv.x+14, r.lv.y+158, 190, 90);
  ctx.strokeStyle='rgba(140,100,180,0.5)'; ctx.lineWidth=2;
  ctx.strokeRect(r.lv.x+20, r.lv.y+164, 178, 78);
  // Coffee table
  ctx.fillStyle='#8a6030'; ctx.fillRect(r.lv.x+54, r.lv.y+162, 100, 44);
  ctx.fillStyle='#6a4010';
  ctx.fillRect(r.lv.x+56,r.lv.y+164,7,7); ctx.fillRect(r.lv.x+145,r.lv.y+164,7,7);
  ctx.fillRect(r.lv.x+56,r.lv.y+199,7,7); ctx.fillRect(r.lv.x+145,r.lv.y+199,7,7);
  // Plant
  ctx.fillStyle='#3a6a1a'; ctx.beginPath(); ctx.arc(r.lv.x+185,r.lv.y+272,20,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2a5a0a'; ctx.beginPath(); ctx.arc(r.lv.x+185,r.lv.y+272,14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4a7a2a'; ctx.beginPath(); ctx.arc(r.lv.x+185,r.lv.y+271,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#7a5a30'; ctx.fillRect(r.lv.x+178,r.lv.y+290,14,28);

  // ── СПАЛЬНЯ ──
  // Bed (full width, against left wall)
  ctx.fillStyle='#5c3010'; ctx.fillRect(r.bd.x+8, r.bd.y+10, 160, 210);
  ctx.fillStyle='#3a1a00'; ctx.fillRect(r.bd.x+8, r.bd.y+10, 12, 210); // headboard
  ctx.fillStyle='#e8d8c8'; ctx.fillRect(r.bd.x+20,r.bd.y+12, 146, 206);
  // Pillows
  ctx.fillStyle='#c8b0a0';
  ctx.fillRect(r.bd.x+24,r.bd.y+18, 130, 44);
  ctx.fillStyle='#d0b8a8';
  ctx.fillRect(r.bd.x+24,r.bd.y+22, 62, 36);
  ctx.fillRect(r.bd.x+92,r.bd.y+22, 62, 36);
  // Duvet
  ctx.fillStyle='#d8c0b0'; ctx.fillRect(r.bd.x+20,r.bd.y+62, 146, 154);
  ctx.fillStyle='#c0a890'; ctx.fillRect(r.bd.x+20,r.bd.y+62, 4, 154);
  // Nightstand top
  ctx.fillStyle='#7a4a1a'; ctx.fillRect(r.bd.x+20,r.bd.y+10, 24, 20);
  ctx.fillStyle='#daa520'; ctx.beginPath(); ctx.arc(r.bd.x+32,r.bd.y+14,5,0,Math.PI*2); ctx.fill();
  // Nightstand bottom
  ctx.fillStyle='#7a4a1a'; ctx.fillRect(r.bd.x+20,r.bd.y+198, 24, 20);
  // Wardrobe unit (right side of bedroom)
  ctx.fillStyle='#6a4a20'; ctx.fillRect(r.bd.x+190,r.bd.y+10, 270, 58);
  ctx.fillStyle='#4a2a00'; ctx.fillRect(r.bd.x+324,r.bd.y+10, 4, 58);
  ctx.fillStyle='#8a6a40';
  ctx.fillRect(r.bd.x+252,r.bd.y+32, 10,8); ctx.fillRect(r.bd.x+386,r.bd.y+32, 10,8);
  // Desk (right side, lower)
  ctx.fillStyle='#9a7040'; ctx.fillRect(r.bd.x+190,r.bd.y+90, 120, 50);
  ctx.fillStyle='#7a5020';
  ctx.fillRect(r.bd.x+192,r.bd.y+92,7,7); ctx.fillRect(r.bd.x+302,r.bd.y+92,7,7);
  // Chair at desk
  ctx.fillStyle='#8a5a30'; ctx.fillRect(r.bd.x+225,r.bd.y+142,36,24);
  ctx.fillRect(r.bd.x+225,r.bd.y+142,36,7);
  // Lежанка Луи (small dog bed)
  ctx.fillStyle='#7a3a1a'; ctx.beginPath(); ctx.ellipse(r.bd.x+390,r.bd.y+195,34,22,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#9a5a2a'; ctx.beginPath(); ctx.ellipse(r.bd.x+390,r.bd.y+195,28,16,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#5a2a0a'; ctx.beginPath(); ctx.arc(r.bd.x+390,r.bd.y+195,8,0,Math.PI*2); ctx.fill();

  // ── САНУЗЕЛ ──
  // Shower (top-left)
  ctx.fillStyle='#a0b8c8'; ctx.fillRect(r.bt.x+8,r.bt.y+8,62,62);
  ctx.fillStyle='#8a9fb0'; ctx.fillRect(r.bt.x+10,r.bt.y+10,58,58);
  ctx.strokeStyle='#7a8fa0'; ctx.lineWidth=1; ctx.strokeRect(r.bt.x+10,r.bt.y+10,58,58);
  ctx.fillStyle='#5a7080'; ctx.beginPath(); ctx.arc(r.bt.x+39,r.bt.y+39,7,0,Math.PI*2); ctx.fill();
  // Sink
  ctx.fillStyle='#ddd'; ctx.fillRect(r.bt.x+8,r.bt.y+82,56,44);
  ctx.fillStyle='#ccc'; ctx.fillRect(r.bt.x+11,r.bt.y+85,50,36);
  ctx.fillStyle='#aaa'; ctx.beginPath(); ctx.arc(r.bt.x+36,r.bt.y+103,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#bbb'; ctx.fillRect(r.bt.x+32,r.bt.y+82,8,7);
  // Toilet
  ctx.fillStyle='#eee'; ctx.fillRect(r.bt.x+8,r.bt.y+138,60,60);
  ctx.fillStyle='#ddd'; ctx.fillRect(r.bt.x+8,r.bt.y+138,60,14);
  ctx.fillStyle='#f5f5f5'; ctx.beginPath(); ctx.ellipse(r.bt.x+38,r.bt.y+170,22,18,0,0,Math.PI*2); ctx.fill();

  // ── ГАРДЕРОБНАЯ ──
  // Hanging rail
  ctx.fillStyle='#bbb';
  ctx.fillRect(r.wd.x+8,r.wd.y+8,r.wd.w-16,4);
  ctx.fillRect(r.wd.x+8,r.wd.y+8,4,18); ctx.fillRect(r.wd.x+r.wd.w-12,r.wd.y+8,4,18);
  // Clothes
  const cc=['#c03030','#3050c0','#30aa30','#c0aa10','#a030a0','#c06010'];
  for(let i=0;i<6;i++){
    ctx.fillStyle=cc[i]; ctx.fillRect(r.wd.x+12+i*33,r.wd.y+12,26,38);
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(r.wd.x+22+i*33,r.wd.y+12,8,8);
  }
  // Shelves
  ctx.fillStyle='#7a5a30';
  ctx.fillRect(r.wd.x+8,r.wd.y+62,r.wd.w-16,5);
  ctx.fillRect(r.wd.x+8,r.wd.y+112,r.wd.w-16,5);
  ctx.fillRect(r.wd.x+8,r.wd.y+162,r.wd.w-16,5);
  // Items
  ctx.fillStyle='#c88040'; ctx.fillRect(r.wd.x+12,r.wd.y+70,36,22);
  ctx.fillStyle='#4080c0'; ctx.fillRect(r.wd.x+54,r.wd.y+70,30,22);
  ctx.fillStyle='#c0c0c0'; ctx.fillRect(r.wd.x+90,r.wd.y+70,40,22);
  ctx.fillStyle='#80c040'; ctx.fillRect(r.wd.x+12,r.wd.y+120,40,22);
  ctx.fillStyle='#c04080'; ctx.fillRect(r.wd.x+58,r.wd.y+120,36,22);
  ctx.fillStyle='#c8a040'; ctx.fillRect(r.wd.x+12,r.wd.y+170,60,22);
}

// ── DRAW MAP ──
function drawMap(){
  ctx.fillStyle=WCLR; ctx.fillRect(0,0,W,H);

  drawFloor(RM.kt.x,RM.kt.y,RM.kt.w,RM.kt.h,'#d4b88a','tile');
  drawFloor(RM.lv.x,RM.lv.y,RM.lv.w,RM.lv.h,'#c4a0a8','carpet');
  drawFloor(RM.bd.x,RM.bd.y,RM.bd.w,RM.bd.h,'#b8a0c0','plank');
  drawFloor(RM.bt.x,RM.bt.y,RM.bt.w,RM.bt.h,'#a8b8c8','tile');
  drawFloor(RM.wd.x,RM.wd.y,RM.wd.w,RM.wd.h,'#c4a87a','plank');

  // Internal walls
  ctx.fillStyle=WCLR;
  ctx.fillRect(238, 10, 10, 308);   // kitchen | living
  ctx.fillRect(10, 318, 460, 10);   // top | bedroom
  ctx.fillRect(10, 558, 460, 10);   // bedroom | bottom
  ctx.fillRect(238, 568, 10, 222);  // bathroom | wardrobe

  // Door openings
  // kitchen → bedroom (left)
  ctx.fillStyle='#d4b88a'; ctx.fillRect(10,318,60,10);
  // living → bedroom (right)
  ctx.fillStyle='#c4a0a8'; ctx.fillRect(390,318,70,10);
  // bedroom → bathroom
  ctx.fillStyle='#b8a0c0'; ctx.fillRect(50,558,60,10);
  // bedroom → wardrobe
  ctx.fillStyle='#b8a0c0'; ctx.fillRect(350,558,60,10);

  // Room labels
  ctx.textAlign='center';
  [
    ['КУХНЯ',         RM.kt.x+RM.kt.w/2, RM.kt.y+RM.kt.h-8],
    ['ГОСТИНАЯ',      RM.lv.x+RM.lv.w/2, RM.lv.y+RM.lv.h-8],
    ['СПАЛЬНЯ',       RM.bd.x+RM.bd.w/2, RM.bd.y+RM.bd.h-8],
    ['САНУЗЕЛ',       RM.bt.x+RM.bt.w/2, RM.bt.y+RM.bt.h-8],
    ['ГАРДЕРОБНАЯ',   RM.wd.x+RM.wd.w/2, RM.wd.y+RM.wd.h-8],
  ].forEach(([lbl,x,y])=>{
    ctx.font="bold 9px 'Courier New'";
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillText(lbl,x+1,y+1);
    ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillText(lbl,x,y);
  });
}

// ── CHARACTER DRAWING (chibi top-down) ──
const SK='#f4c2a1';
function shadow(cx,cy){ ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(cx,cy+2,12,5,0,0,Math.PI*2); ctx.fill(); }

function drawButler(cx,cy,frame,dir){
  const b=frame===0?0:-2; shadow(cx,cy+18);
  ctx.fillStyle='#1a2070';
  if(dir===1){ctx.fillRect(cx-7,cy+10+b,5,8);ctx.fillRect(cx+2,cy+12+b,5,6);}
  else{ctx.fillRect(cx-7,cy+12+b,5,6);ctx.fillRect(cx+2,cy+10+b,5,8);}
  ctx.fillStyle='#111'; ctx.fillRect(cx-8,cy+17+b,6,3); ctx.fillRect(cx+2,cy+17+b,6,3);
  ctx.fillStyle='#1a2070'; ctx.beginPath(); ctx.roundRect(cx-10,cy,20,12,3); ctx.fill();
  ctx.fillStyle='#f0f0f0'; ctx.fillRect(cx-3,cy+1,6,10);
  ctx.fillStyle='#cc1010'; ctx.fillRect(cx-2,cy+2,2,4); ctx.fillRect(cx+0,cy+4,2,1); ctx.fillRect(cx+2,cy+2,2,4);
  ctx.fillStyle=SK; ctx.beginPath(); ctx.arc(cx,cy-7+b,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222'; ctx.fillRect(cx-5,cy-9+b,3,3); ctx.fillRect(cx+2,cy-9+b,3,3);
  ctx.fillStyle='#fff'; ctx.fillRect(cx-5,cy-9+b,1,1); ctx.fillRect(cx+2,cy-9+b,1,1);
  ctx.fillStyle='#c07060'; ctx.fillRect(cx-3,cy-4+b,6,2);
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.roundRect(cx-6,cy-22+b,12,14,1); ctx.fill();
  ctx.fillRect(cx-9,cy-10+b,18,3);
  ctx.fillStyle='#cc1010'; ctx.fillRect(cx-6,cy-12+b,12,2);
}

function drawChef(cx,cy,frame,dir){
  const b=frame===0?0:-2; shadow(cx,cy+18);
  ctx.fillStyle='#f0f0f0';
  if(dir===1){ctx.fillRect(cx-7,cy+10+b,5,8);ctx.fillRect(cx+2,cy+12+b,5,6);}
  else{ctx.fillRect(cx-7,cy+12+b,5,6);ctx.fillRect(cx+2,cy+10+b,5,8);}
  ctx.fillStyle='#555'; ctx.fillRect(cx-8,cy+17+b,6,3); ctx.fillRect(cx+2,cy+17+b,6,3);
  ctx.fillStyle='#f0f0f0'; ctx.beginPath(); ctx.roundRect(cx-10,cy,20,12,3); ctx.fill();
  ctx.fillStyle='#e0e0e0'; ctx.fillRect(cx-6,cy,12,12);
  ctx.fillStyle='#ccc'; ctx.fillRect(cx-1,cy,2,12);
  ctx.fillStyle=SK; ctx.beginPath(); ctx.arc(cx,cy-7+b,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222'; ctx.fillRect(cx-5,cy-9+b,3,3); ctx.fillRect(cx+2,cy-9+b,3,3);
  ctx.fillStyle='#fff'; ctx.fillRect(cx-5,cy-9+b,1,1); ctx.fillRect(cx+2,cy-9+b,1,1);
  ctx.fillStyle='#c07060'; ctx.fillRect(cx-3,cy-4+b,6,2);
  ctx.fillStyle='#6a4020'; ctx.fillRect(cx-4,cy-5+b,8,2);
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.roundRect(cx-7,cy-32+b,14,24,5); ctx.fill();

// ── ANIMATION ──
let tick=0, anim=0;
CHARS.forEach(ch=>{ ch.tx=ch.x; ch.ty=ch.y; ch.waitTimer=Math.floor(Math.random()*120); });

function newTarget(ch){
  const z=ch.zone;
  ch.tx=z.x+20+Math.random()*(z.w-40);
  ch.ty=z.y+20+Math.random()*(z.h-40);
  ch.waitTimer=60+Math.floor(Math.random()*180);
}

function update(){
  tick++; if(tick%20===0) anim^=1;
  for(const ch of CHARS){
    if(ch.waitTimer>0){ch.waitTimer--;continue;}
    const dx=ch.tx-ch.x, dy=ch.ty-ch.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<4){newTarget(ch);continue;}
    const spd=ch.id==='pug'?ch.spd*1.8:ch.spd;
    ch.x+=dx/dist*spd; ch.y+=dy/dist*spd;
    ch.dir=dx>0?1:-1;
  }
}

function draw(){
  drawMap(); drawFurniture();
  const sorted=[...CHARS].sort((a,b)=>a.y-b.y);
  for(const ch of sorted){
    ctx.save(); ch.draw(ch.x,ch.y,anim,ch.dir); ctx.restore();
    ctx.font="8px 'Courier New'"; ctx.textAlign='center';
    const tw=ctx.measureText(ch.name.split(' ')[0]).width;
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(ch.x-tw/2-4,ch.y-32,tw+8,12);
    ctx.fillStyle='#ffd700'; ctx.fillText(ch.name.split(' ')[0],ch.x,ch.y-22);
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();

// ── TOUCH + CLICK ──
function handleTap(e){
  const rc=canvas.getBoundingClientRect();
  const scaleX=W/rc.width, scaleY=H/rc.height;
  let cx, cy;
  if(e.touches){ cx=(e.touches[0].clientX-rc.left)*scaleX; cy=(e.touches[0].clientY-rc.top)*scaleY; }
  else { cx=(e.clientX-rc.left)*scaleX; cy=(e.clientY-rc.top)*scaleY; }
  for(const ch of [...CHARS].reverse()){
    if(Math.abs(cx-ch.x)<22&&Math.abs(cy-ch.y)<32){ openPanel(ch); return; }
  }
}
canvas.addEventListener('click', handleTap);
canvas.addEventListener('touchend', e=>{ e.preventDefault(); handleTap(e); }, {passive:false});

// ── DYNAMIC DATA LOADING ──
async function fetchJSON(path){
  try{ const r=await fetch(path); return r.ok ? await r.json() : null; }
  catch{ return null; }
}

const BASE='./household-data/';

async function loadCharData(id){
  switch(id){

    case 'butler': {
      const [fam, tasks]=await Promise.all([
        fetchJSON(BASE+'family-profile.json'),
        fetchJSON(BASE+'agents/butler-tasks.json'),
      ]);
      const members=fam?.family?.members||[];
      const pets=fam?.family?.pets||[];
      const pending=(tasks?.pending||[]);
      const hasUrgent=pending.some(t=>t.priority==='срочный');
      let html=`<span class="badge ${hasUrgent?'warn':'ok'}">${hasUrgent?'⚠ Срочные задачи':'На посту'}</span>`;
      html+=`<div class="section-label">СЕМЬЯ</div><ul>`;
      members.forEach(m=>{ const age=m.age_months?`${m.age_months} мес.`:`${m.age} лет`; html+=`<li>${m.name} (${m.role}, ${age})</li>`; });
      pets.forEach(p=>html+=`<li>${p.name} (${p.breed}, ${p.age} г.)</li>`);
      html+=`</ul>`;
      if(pending.length){
        html+=`<div class="section-label">В ОЧЕРЕДИ (${pending.length})</div><ul>`;
        pending.forEach(t=>html+=`<li>${t.priority==='срочный'?'🚨':t.priority==='высокий'?'🔴':'🔵'} ${t.title}</li>`);
        html+=`</ul>`;
      }
      return html;
    }

    case 'chef': {
      const [prefs, menu, tasks]=await Promise.all([
        fetchJSON(BASE+'kitchen/food-preferences.json'),
        fetchJSON(BASE+'kitchen/weekly-menu.json'),
        fetchJSON(BASE+'agents/chef-tasks.json'),
      ]);
      const budget=prefs?.household?.weekly_budget_rub;
      const menuStatus=menu?.status==='not_planned'?'⏳ Не составлено':'✅ Готово';
      const pending=(tasks?.pending||[]);
      const hasUrgent=pending.some(t=>t.priority==='срочный'||t.priority==='высокий');
      let html=`<span class="badge ${hasUrgent?'warn':'ok'}">${hasUrgent?'Есть задачи':'Готов'}</span>`;
      html+=`<div class="section-label">СТАТУС</div><ul>`;
      html+=`<li>💰 Бюджет: ${budget?budget.toLocaleString('ru')+'₽/нед':'не указан'}</li>`;
      html+=`<li>📅 Меню: ${menuStatus}</li>`;
      html+=`</ul>`;
      if(pending.length){
        html+=`<div class="section-label">ЗАДАЧИ (${pending.length})</div><ul>`;
        pending.forEach(t=>html+=`<li>${t.priority==='срочный'?'🚨':t.priority==='высокий'?'🔴':'🔵'} ${t.title}${t.due?' — до '+t.due:''}</li>`);
        html+=`</ul>`;
      }
      return html;
    }

    case 'cleaner': {
      const [home, tasks]=await Promise.all([
        fetchJSON(BASE+'cleaning/home-profile.json'),
        fetchJSON(BASE+'agents/cleaner-tasks.json'),
      ]);
      const day=home?.cleaning_preferences?.preferred_days?.[0]||'пн';
      const pending=(tasks?.pending||[]);
      const hasUrgent=pending.some(t=>t.priority==='срочный'||t.priority==='высокий');
      let html=`<span class="badge ${hasUrgent?'warn':'ok'}">${hasUrgent?'Есть задачи':'Готова'}</span>`;
      html+=`<div class="section-label">СТАТУС</div><ul>`;
      html+=`<li>📅 День уборки: ${day}</li>`;
      html+=`</ul>`;
      if(pending.length){
        html+=`<div class="section-label">ЗАДАЧИ (${pending.length})</div>`;
        pending.forEach(t=>{
          html+=`<ul><li>${t.priority==='высокий'?'🔴':'🔵'} ${t.title}</li>`;
          if(t.checklist) t.checklist.slice(0,3).forEach(c=>html+=`<li style="padding-left:12px;color:#888">▸ ${c}</li>`);
          html+=`</ul>`;
        });
      }
      return html;
    }

    case 'supply': {
      const [inv, tasks]=await Promise.all([
        fetchJSON(BASE+'supplies/inventory.json'),
        fetchJSON(BASE+'agents/supply-tasks.json'),
      ]);
      const pending=(tasks?.pending||[]);
      const urgent=pending.filter(t=>t.priority==='срочный');
      let html=`<span class="badge ${urgent.length?'warn':'ok'}">${urgent.length?'⚠ Срочно':'Готов'}</span>`;
      if(pending.length){
        html+=`<div class="section-label">ЗАДАЧИ (${pending.length})</div><ul>`;
        pending.forEach(t=>html+=`<li>${t.priority==='срочный'?'🚨':t.priority==='высокий'?'🔴':'🔵'} ${t.title}${t.due?' — до '+t.due:''}</li>${t.details?`<li style="padding-left:12px;color:#888;font-size:11px">${t.details}</li>`:''}`);
        html+=`</ul>`;
      }
      const petFood=(inv?.categories?.pet_supplies||[]).find(i=>i.animal==='Луи');
      if(petFood) html+=`<div class="note">🐾 Корм Луи: ${petFood.quantity}${petFood.alert?' ⚠️':''}</div>`;
      return html;
    }

    case 'pug': {
      const [fam, inv]=await Promise.all([
        fetchJSON(BASE+'family-profile.json'),
        fetchJSON(BASE+'supplies/inventory.json'),
      ]);
      const pet=fam?.family?.pets?.[0];
      const food=(inv?.categories?.pet_supplies||[]).find(i=>i.animal==='Луи');
      let html=`<span class="badge ok">Бегает везде</span>`;
      if(pet) html+=`<ul><li>🐾 ${pet.breed}, ${pet.age} года</li><li>🏠 Живёт дома постоянно</li><li>🛏 Лежанка в спальне</li></ul>`;
      if(food) html+=`<div class="note">🍖 ${food.name}: ${food.quantity}${food.alert?' ⚠️ Купить срочно!':''}</div>`;
      return html;
    }

    default: return null;
  }
}

async function openPanel(ch){
  document.getElementById('pt').textContent=ch.name;
  document.getElementById('pc').innerHTML='<div style="color:#555;text-align:center;padding:16px">Загрузка...</div>';
  document.getElementById('panel').style.display='block';
  document.getElementById('overlay').style.display='block';

  const dynHtml=await loadCharData(ch.id);

  // Tasks always shown
  let tasksHtml=`<div style="margin-top:10px;color:#ffd700;font-size:10px;letter-spacing:1px">ЗАДАЧИ</div><ul>`;
  ch.tasks.forEach(t=>tasksHtml+=`<li>${t}</li>`);
  tasksHtml+=`</ul>`;
  if(ch.note) tasksHtml+=`<div class="note">${ch.note}</div>`;

  document.getElementById('pc').innerHTML=(dynHtml||`<span class="badge ${ch.badge}">${ch.badgeText}</span>`)+tasksHtml;
}

function closePanel(){
  document.getElementById('panel').style.display='none';
  document.getElementById('overlay').style.display='none';
}
